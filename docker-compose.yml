# starts 1 docker container running AIStor.
services:
  aistor:
    image: ${AISTOR_IMAGE:-quay.io/minio/aistor/minio:latest}
    command: server --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_LICENSE: /etc/minio/minio.license
      MINIO_VOLUMES: /data-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    hostname: aistor
    volumes:
      - data-1:/data-1
      - ~/Downloads/minio.license:/etc/minio/minio.license
    ports:
      - "9000:9000"
      - "9001:9001"
    container_name: aistor


volumes:
  data-1:
